<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kristian Band | @kristiantband</title>
    <meta name="description" content="Personal landing page for Kristian Band. UX Design, Coding, Fitness, and Photography.">
    <style>
        /* --- Design Tokens & Reset --- */
        :root {
            --bg-color: #09090b;
            --card-bg: #18181b;
            --card-hover: #27272a;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --accent: #ffffff;
            --focus-outline: #3b82f6;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-stack);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* --- Layout Container --- */
        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* --- Header Section --- */
        header {
            margin-bottom: 2.5rem;
        }

        .profile-title {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
        }

        .profile-handle {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin-bottom: 1.25rem;
            display: block;
        }

        .bio {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text-secondary);
            max-width: 360px;
            margin: 0 auto;
        }

        /* --- Navigation / Links --- */
        .links-nav {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 1.5rem;
            background-color: var(--card-bg);
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            font-size: 1rem;
            transition: background-color 0.2s ease, transform 0.15s ease;
            border: 1px solid rgba(255, 255, 255, 0.03);
            /* Target size accessibility compliance */
            min-height: 3.5rem; 
        }

        /* Hover & Interaction States */
        .link-item:hover {
            background-color: var(--card-hover);
            transform: translateY(-1px);
        }

        .link-item:active {
            transform: translateY(0);
        }

        /* Highly visible keyboard focus indicator */
        .link-item:focus-visible {
            outline: 2px solid var(--focus-outline);
            outline-offset: 2px;
            background-color: var(--card-hover);
        }

        /* Flex alignment for text + optional subtle arrow */
        .link-text {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .arrow-icon {
            opacity: 0.4;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .link-item:hover .arrow-icon {
            opacity: 1;
            transform: translateX(2px);
        }

        /* --- Footer --- */
        footer {
            margin-top: 4rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Profile Header -->
        <header>
            <h1 class="profile-title">Kristian Band</h1>
            <span class="profile-handle">@kristiantband</span>
            <p class="bio">UX Design &bull; Coding &bull; Fitness &bull; Photography</p>
        </header>

        <!-- Accessibly marked up navigation container -->
        <nav class="links-nav" aria-label="Primary Social Links">
            
            <a href="https://linkedin.com/in/your_username" class="link-item" target="_blank" rel="noopener noreferrer">
                <span class="link-text">LinkedIn</span>
                <svg class="arrow-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M6 12L10 8L6 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>

            <a href="https://instagram.com/your_username" class="link-item" target="_blank" rel="noopener noreferrer">
                <span class="link-text">Instagram</span>
                <svg class="arrow-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M6 12L10 8L6 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>

            <a href="https://open.spotify.com/user/your_username" class="link-item" target="_blank" rel="noopener noreferrer">
                <span class="link-text">Spotify</span>
                <svg class="arrow-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M6 12L10 8L6 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>

            <a href="https://x.com/your_username" class="link-item" target="_blank" rel="noopener noreferrer">
                <span class="link-text">X / Twitter</span>
                <svg class="arrow-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M6 12L10 8L6 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>

            <a href="https://facebook.com/your_username" class="link-item" target="_blank" rel="noopener noreferrer">
                <span class="link-text">Facebook</span>
                <svg class="arrow-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M6 12L10 8L6 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>

        </nav>

        <footer>
            <p>&copy; 2026 kristiantband.com</p>
        </footer>
    </div>

</body>
</html>
