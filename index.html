<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ktb | Back online shortly, ktb.</title>
    <meta name="description" content="Kristian Band's personal site is currently undergoing a quick update. Back online shortly.">
    <style>
        :root {
            --bg-color: #09090b;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-stack);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        .maintenance-card {
            text-align: center;
            max-width: 360px;
        }

        /* Subtle modern status indicator */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: #18181b;
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: #a1a1aa;
            border-radius: 50%;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <main class="maintenance-card" role="main">
        <div class="status-indicator">
            <span class="pulse-dot" aria-hidden="true"></span>
            <span>Maintenance</span>
        </div>
        <h1>kristiantband.com</h1>
        <p>Back online shortly, ktb.</p>
    </main>

</body>
</html>
